name: AI PR Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI PR Review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build PR diff
        id: diff
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -sSf \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${{ github.api_url }}/repos/${{ github.repository }}/compare/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }}" \
            > pr.diff
          echo "diff_path=pr.diff" >> "$GITHUB_OUTPUT"

      - name: Review with Fallback
        run: node .github/scripts/review-fallback.mjs "${{ steps.diff.outputs.diff_path }}" > fallback-review.md

      - name: Compose PR comment
        run: |
          {
            echo "## 🤖 AI CI 리뷰 결과"
            echo
            echo "- 실행 모드: 자동 PR(Fallback only)"
            echo "- 상세 AI 리뷰는 GitHub App에서 \`/gemini review\`, \`@coderabbitai review\`로 요청하세요."
            echo
            echo "### Fallback (Rule-based)"
            cat fallback-review.md
            echo
            echo "---"
            echo "_자동 생성 코멘트입니다. 필요 시 사람이 최종 확인하세요._"
          } > ai-review-comment.md

      - name: Find existing AI comment
        id: find_comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "## 🤖 AI CI 리뷰 결과"

      - name: Create or update AI comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          body-path: ai-review-comment.md
          edit-mode: replace
