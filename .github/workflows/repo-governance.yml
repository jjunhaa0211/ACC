name: Repo Governance

on:
  workflow_dispatch:

permissions:
  contents: read
  administration: write

jobs:
  apply-governance:
    name: Apply Branch Protection & Merge Queue
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply governance rules
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN != '' && secrets.REPO_ADMIN_TOKEN || github.token }}
        run: ./.github/scripts/apply-repo-governance.sh "${{ github.repository }}"
