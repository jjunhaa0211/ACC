name: AI Review Policy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-from-ai-comments:
    name: Detect AI Findings Label
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment' || github.event_name == 'pull_request'

    steps:
      - name: Scan AI comments and sync blocker label
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const labelName = "ai-security-blocker";

            let prNumber = null;
            if (context.eventName === "pull_request") {
              prNumber = context.payload.pull_request?.number || null;
            } else if (context.eventName === "issue_comment") {
              if (context.payload.issue?.pull_request) {
                prNumber = context.payload.issue.number;
              }
            }

            if (!prNumber) {
              core.notice("PR 컨텍스트가 없어 라벨 동기화를 건너뜁니다.");
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });

            const aiAuthorRegex = /(coderabbit|gemini|code-assist)/i;
            const blockerRegex = /(security|vulnerab|취약|보안|regression|회귀|breaking|critical|high severity)/i;
            const needsBlock = comments.some((comment) => {
              const login = String(comment.user?.login || "");
              const body = String(comment.body || "");
              return aiAuthorRegex.test(login) && blockerRegex.test(body);
            });

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: prNumber
            });
            const labels = (issue.data.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );
            const hasLabel = labels.includes(labelName);

            if (needsBlock && !hasLabel) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: [labelName]
              });
              core.notice(`라벨 추가: ${labelName} (PR #${prNumber})`);
              return;
            }

            if (!needsBlock && hasLabel) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: labelName
                });
                core.notice(`라벨 제거: ${labelName} (PR #${prNumber})`);
              } catch (error) {
                if (error?.status !== 404) {
                  throw error;
                }
              }
              return;
            }

            core.notice(
              `라벨 상태 유지: needsBlock=${needsBlock}, hasLabel=${hasLabel} (PR #${prNumber})`
            );

  policy-gate:
    name: AI Review Policy
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' || github.event_name == 'pull_request_review') && github.event.pull_request.draft == false

    steps:
      - name: Checkout policy scripts
        uses: actions/checkout@v6

      - name: Enforce AI PR body contract
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/validate-ai-pr-body.mjs

      - name: Enforce human approval on AI security/regression blockers
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request?.number;
            const blockerLabel = "ai-security-blocker";

            if (!prNumber) {
              core.notice("PR 컨텍스트가 없어 승인 정책 체크를 건너뜁니다.");
              return;
            }

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });
            const labels = (pr.data.labels || []).map((label) => label.name);
            const hasBlocker = labels.includes(blockerLabel);

            if (!hasBlocker) {
              core.notice("ai-security-blocker 라벨 없음: 승인 강제 조건 없음");
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100
            });

            const latestByUser = new Map();
            for (const review of reviews) {
              const login = review.user?.login;
              if (!login) continue;
              const previous = latestByUser.get(login);
              const prevTime = Date.parse(previous?.submitted_at || 0);
              const nextTime = Date.parse(review.submitted_at || 0);
              if (!previous || nextTime >= prevTime || review.id > previous.id) {
                latestByUser.set(login, review);
              }
            }

            const humanApprovals = Array.from(latestByUser.values()).filter(
              (review) => review.state === "APPROVED" && review.user?.type !== "Bot"
            );

            if (humanApprovals.length < 1) {
              core.setFailed(
                "AI 리뷰에서 보안/회귀 이슈가 감지되었습니다. 사람 리뷰어의 APPROVED 상태가 최소 1건 필요합니다."
              );
              return;
            }

            core.notice(`Blocker detected, human approval count: ${humanApprovals.length}`);
            core.notice("AI review policy check passed.");
