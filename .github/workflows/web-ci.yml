name: Web CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Validate core files
        run: |
          test -f index.html
          test -f script.js
          test -f eslint.config.js
          test -f .github/scripts/check-static-site.mjs
          test -f .github/scripts/capture-pr-screenshot.mjs
          test -f .github/scripts/capture-pr-video.mjs
          test -f .github/scripts/serve-static-ci.mjs
          test -f .github/scripts/scan-secrets.mjs

      - name: JS syntax check
        run: |
          node --check script.js
          node --check eslint.config.js
          node --check .github/scripts/check-static-site.mjs
          node --check .github/scripts/capture-pr-screenshot.mjs
          node --check .github/scripts/capture-pr-video.mjs
          node --check .github/scripts/review-fallback.mjs
          node --check .github/scripts/serve-static-ci.mjs
          node --check .github/scripts/scan-secrets.mjs

      - name: Static site validation
        run: node .github/scripts/check-static-site.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: acc-static-web
          path: |
            index.html
            script.js

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        run: node .github/scripts/scan-secrets.mjs --history 80

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check dependency graph status
        id: dep_graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(gh api "repos/${{ github.repository }}" --jq '.security_and_analysis.dependency_graph.status' 2>/dev/null || echo "unknown")
          if [ -z "$status" ] || [ "$status" = "null" ]; then
            status="unknown"
          fi
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "Dependency graph status: ${status}"

      - name: Dependency review
        if: steps.dep_graph.outputs.status == 'enabled'
        uses: actions/dependency-review-action@v4

      - name: Skip notice
        if: steps.dep_graph.outputs.status != 'enabled'
        run: echo "Dependency Graph가 비활성이어서 Dependency Review를 건너뜁니다."

  e2e-playwright:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [quality-gate]
    permissions:
      contents: write
      pull-requests: write
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e
        run: npm run test:e2e:ci

      - name: Capture CI visual screenshot
        if: always()
        continue-on-error: true
        run: npm run capture:pr-screenshot -- test-results/ci/pr-preview.png

      - name: Capture CI visual video
        if: always()
        continue-on-error: true
        run: npm run capture:pr-video -- test-results/ci/pr-preview.webm

      - name: Prepare visual bundle
        if: always() && github.event_name == 'pull_request'
        id: visual_bundle
        run: |
          set -euo pipefail
          pr_dir=".ci-visual/pull-request-${{ github.event.pull_request.number }}"
          latest_dir="${pr_dir}/latest"
          run_dir="${pr_dir}/runs/${{ github.run_id }}"
          mkdir -p "${latest_dir}" "${run_dir}"

          has_image=false
          has_video=false

          if [ -f "test-results/ci/pr-preview.png" ]; then
            cp "test-results/ci/pr-preview.png" "${latest_dir}/pr-preview.png"
            cp "test-results/ci/pr-preview.png" "${run_dir}/pr-preview.png"
            has_image=true
          fi

          video_file=""
          if [ -f "test-results/ci/pr-preview.webm" ]; then
            video_file="test-results/ci/pr-preview.webm"
          else
            video_file=$(find test-results -type f -name "*.webm" | head -n 1 || true)
          fi
          if [ -n "${video_file}" ]; then
            cp "${video_file}" "${latest_dir}/e2e-sample.webm"
            cp "${video_file}" "${run_dir}/e2e-sample.webm"
            has_video=true
          fi

          has_assets=false
          if [ "${has_image}" = "true" ] || [ "${has_video}" = "true" ]; then
            has_assets=true
          fi

          echo "has_image=${has_image}" >> "${GITHUB_OUTPUT}"
          echo "has_video=${has_video}" >> "${GITHUB_OUTPUT}"
          echo "has_assets=${has_assets}" >> "${GITHUB_OUTPUT}"

      - name: Publish PR visual assets
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.visual_bundle.outputs.has_assets == 'true'
        id: publish_visual
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: .ci-visual
          publish_branch: ci-visual-artifacts
          keep_files: true
          force_orphan: false
          commit_message: "ci: update visual assets for PR #${{ github.event.pull_request.number }} (run ${{ github.run_id }})"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            playwright-report
            test-results

      - name: Build PR visual comment body
        if: always() && github.event_name == 'pull_request'
        env:
          E2E_RESULT: ${{ steps.e2e.outcome }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PUBLISH_OUTCOME: ${{ steps.publish_visual.outcome || 'skipped' }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          HAS_IMAGE: ${{ steps.visual_bundle.outputs.has_image }}
          HAS_VIDEO: ${{ steps.visual_bundle.outputs.has_video }}
        run: |
          set -euo pipefail
          run_url="https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}"
          raw_base="https://raw.githubusercontent.com/${REPOSITORY}/ci-visual-artifacts/pull-request-${PR_NUMBER}/latest"

          {
            echo "## 🎬 CI Visual Report"
            echo
            echo "- E2E 결과: \`${E2E_RESULT}\`"
            echo "- 워크플로 실행: [run #${RUN_ID}](${run_url})"
            echo "- Playwright 아티팩트: \`playwright-artifacts-${RUN_ID}\` (영상/트레이스/리포트)"
            echo

            if [ "${HAS_IMAGE}" = "true" ] && [ "${PUBLISH_OUTCOME}" = "success" ]; then
              echo "### 🖼️ Screenshot"
              echo "![CI Preview](${raw_base}/pr-preview.png?run=${RUN_ID})"
              echo
            elif [ "${HAS_IMAGE}" = "true" ]; then
              echo "- 스크린샷은 생성됐지만 PR 코멘트 인라인 업로드는 권한 제한으로 생략되었습니다."
              echo "- 실행 링크에서 아티팩트를 열어 확인해주세요: ${run_url}"
              echo
            else
              echo "- 스크린샷을 생성하지 못했습니다. 실행 로그를 확인해주세요."
              echo
            fi

            if [ "${HAS_VIDEO}" = "true" ] && [ "${PUBLISH_OUTCOME}" = "success" ]; then
              echo "### 🎥 Video"
              echo "[E2E Sample Video (webm)](${raw_base}/e2e-sample.webm?run=${RUN_ID})"
              echo
            elif [ "${HAS_VIDEO}" = "true" ]; then
              echo "- 샘플 비디오는 생성됐지만 직접 링크 업로드는 권한 제한으로 생략되었습니다."
              echo "- 실행 링크에서 아티팩트를 열어 확인해주세요: ${run_url}"
              echo
            else
              echo "- 샘플 비디오를 찾지 못했습니다. 테스트가 시작 전에 중단됐을 수 있습니다."
              echo
            fi

            echo "_자동 생성 코멘트입니다._"
          } > ci-visual-comment.md

      - name: Find existing CI visual comment
        if: always() && github.event_name == 'pull_request'
        id: find_visual_comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "## 🎬 CI Visual Report"

      - name: Create or update CI visual comment
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_visual_comment.outputs.comment-id }}
          edit-mode: replace
          body-path: ci-visual-comment.md

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [quality-gate]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse quality gate
        run: npm run test:lighthouse

  web-ci-status:
    name: Web CI
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      checks: read
      pull-requests: write
      issues: write
    needs:
      - quality-gate
      - secret-scan
      - dependency-review
      - e2e-playwright
      - lighthouse

    steps:
      - name: Check upstream job results
        run: |
          fail=false

          report() {
            name="$1"
            result="$2"
            echo "${name}: ${result}"
            if [ "${result}" = "failure" ] || [ "${result}" = "cancelled" ]; then
              fail=true
            fi
          }

          report "Quality Gate" "${{ needs.quality-gate.result }}"
          report "Secret Scan" "${{ needs.secret-scan.result }}"
          report "Dependency Review" "${{ needs.dependency-review.result }}"
          report "E2E (Playwright)" "${{ needs.e2e-playwright.result }}"
          report "Lighthouse CI" "${{ needs.lighthouse.result }}"

          if [ "${fail}" = true ]; then
            echo "One or more required Web CI jobs failed."
            exit 1
          fi

          echo "Web CI aggregate check passed."

      - name: Post final CI digest and trigger Codex connector
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          QUALITY_GATE_RESULT: ${{ needs.quality-gate.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
          DEP_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          E2E_RESULT: ${{ needs.e2e-playwright.result }}
          LIGHTHOUSE_RESULT: ${{ needs.lighthouse.result }}
        with:
          script: |
            const marker = "<!-- web-ci-final-digest -->";
            const prNumber = context.payload.pull_request?.number;

            if (!prNumber) {
              core.notice("Skip: no pull request context.");
              return;
            }

            const { owner, repo } = context.repo;
            const headSha = context.payload.pull_request.head.sha;

            const webJobRows = [
              ["Quality Gate", process.env.QUALITY_GATE_RESULT || "unknown"],
              ["Secret Scan", process.env.SECRET_SCAN_RESULT || "unknown"],
              ["Dependency Review", process.env.DEP_REVIEW_RESULT || "unknown"],
              ["E2E (Playwright)", process.env.E2E_RESULT || "unknown"],
              ["Lighthouse CI", process.env.LIGHTHOUSE_RESULT || "unknown"]
            ];

            const internalCheckNames = new Set(webJobRows.map(([name]) => name).concat(["Web CI"]));
            const maxAttempts = 30;
            const sleepMs = 15000;

            const pickLatestByName = (checks) => {
              const map = new Map();
              for (const check of checks) {
                const previous = map.get(check.name);
                if (!previous) {
                  map.set(check.name, check);
                  continue;
                }

                const prevTime = Date.parse(previous.started_at || previous.completed_at || previous.created_at || 0);
                const nextTime = Date.parse(check.started_at || check.completed_at || check.created_at || 0);
                if (nextTime > prevTime || check.id > previous.id) {
                  map.set(check.name, check);
                }
              }
              return Array.from(map.values());
            };

            let latestActionChecks = [];
            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const allChecks = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref: headSha,
                per_page: 100
              });

              const actionChecks = allChecks.filter((check) => check.app?.slug === "github-actions");
              latestActionChecks = pickLatestByName(actionChecks);

              const pending = latestActionChecks.filter(
                (check) => !internalCheckNames.has(check.name) && check.status !== "completed"
              );
              if (pending.length === 0) {
                break;
              }

              if (attempt < maxAttempts) {
                core.notice(
                  `Waiting for other CI checks to complete (${attempt}/${maxAttempts}): ${pending.map((item) => item.name).join(", ")}`
                );
                await new Promise((resolve) => setTimeout(resolve, sleepMs));
              }
            }

            const statusLabel = (status, conclusion) => {
              const normalizedStatus = String(status || "").toLowerCase();
              const normalizedConclusion = String(conclusion || "").toLowerCase();

              if (normalizedStatus !== "completed") {
                return `IN_PROGRESS (${normalizedStatus || "unknown"})`;
              }
              if (normalizedConclusion === "success") return "SUCCESS";
              if (normalizedConclusion === "failure") return "FAILURE";
              if (normalizedConclusion === "cancelled") return "CANCELLED";
              if (normalizedConclusion === "skipped") return "SKIPPED";
              return normalizedConclusion ? normalizedConclusion.toUpperCase() : "UNKNOWN";
            };

            const internalRows = webJobRows.map(([name, result]) =>
              `| ${name} | ${statusLabel("completed", result)} | - |`
            );

            const externalRows = latestActionChecks
              .filter((check) => !internalCheckNames.has(check.name))
              .sort((a, b) => a.name.localeCompare(b.name))
              .map((check) => `| ${check.name} | ${statusLabel(check.status, check.conclusion)} | [details](${check.html_url}) |`);

            const prResponse = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });
            const pr = prResponse.data;

            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100
            });

            const filePreview = changedFiles
              .slice(0, 8)
              .map((file) => `- \`${file.filename}\` (+${file.additions}/-${file.deletions})`);

            const bodyLines = [
              marker,
              "## Final CI Digest (Auto)",
              "",
              `Head SHA: \`${headSha}\``,
              `PR: #${pr.number} (${pr.title})`,
              "",
              "### Web CI Test Results",
              "| Check | Status | Link |",
              "|---|---|---|",
              ...internalRows,
              "",
              "### Other CI Results (GitHub Actions)",
              "| Check | Status | Link |",
              "|---|---|---|",
              ...(externalRows.length > 0 ? externalRows : ["| (none detected) | N/A | - |"]),
              "",
              "### Current PR Snapshot",
              `- Files changed: ${pr.changed_files}`,
              `- Additions/Deletions: +${pr.additions}/-${pr.deletions}`,
              `- Latest update: ${pr.updated_at}`,
              "",
              "Changed files (top 8):",
              ...(filePreview.length > 0 ? filePreview : ["- (no file list)"]),
              "",
              "### ChatGPT Codex Connector Request",
              "@codex review",
              "Please provide a concise Korean summary of this PR final CI and test status, including:",
              "1. overall pass/fail signal,",
              "2. key test outcomes,",
              "3. current change scope.",
              "",
              "_If Codex does not respond, verify the ChatGPT Codex Connector app is installed and connected to this repository._"
            ];

            const body = bodyLines.join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });
            const existing = comments.find(
              (comment) => comment.user?.login === "github-actions[bot]" && typeof comment.body === "string" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            }
