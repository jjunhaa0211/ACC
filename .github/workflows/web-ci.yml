name: Web CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate core files
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js
          test -f .github/scripts/check-static-site.mjs
          test -f .github/scripts/scan-secrets.mjs
          grep -q "안녕하세요! 반가워요!" script.js

      - name: JS syntax check
        run: |
          node --check script.js
          node --check .github/scripts/check-static-site.mjs
          node --check .github/scripts/review-fallback.mjs
          node --check .github/scripts/scan-secrets.mjs

      - name: Static site validation
        run: node .github/scripts/check-static-site.mjs

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: acc-static-web
          path: |
            index.html
            styles.css
            script.js

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        run: node .github/scripts/scan-secrets.mjs --history 80

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4
